# SantaCruzOVR edge — TLS + reverse proxy to the Next standalone app.
# Upstream resolved via Docker DNS at request time so rolling redeploys never
# pin nginx to a dead VIP. DOMAIN is rendered by remote-deploy.sh.

worker_processes auto;
events { worker_connections 4096; }

http {
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  sendfile on; tcp_nopush on; keepalive_timeout 65;
  client_max_body_size 25m;
  proxy_http_version 1.1;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
  gzip_min_length 1024;

  map $http_upgrade $conn_upgrade { default upgrade; '' close; }

  server {
    listen 80 default_server;
    location = /healthz-edge { return 200 "ok\n"; }
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # ---- ovr.stacruz (Next standalone app; API routes live in /api/*) ----
  server {
    listen 443 ssl; http2 on;
    server_name ovr.stacruz.DOMAIN;
    ssl_certificate     /etc/letsencrypt/live/ovr.stacruz.DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ovr.stacruz.DOMAIN/privkey.pem;
    location / {
      set $up http://app:4300;
      proxy_pass $up;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $conn_upgrade;
      proxy_read_timeout 300s;
    }
  }
}
