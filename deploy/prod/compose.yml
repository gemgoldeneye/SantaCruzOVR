# SantaCruzOVR (e-OVR) — PRODUCTION stack (Docker Swarm, single VPS, zero-downtime).
#
# Single self-contained Next.js app — API routes (app/api/*) talk DIRECTLY to
# managed Postgres (Prisma) + Redis. No separate api service. Images are built on
# the VPS (no registry). This stack owns its OWN edge (nginx :80/:443 TLS).
#
#   export TAG=<sha>
#   docker stack deploy -c deploy/prod/compose.yml stcz-ovr
#
version: "3.9"
# NB: no top-level `name:` — `docker stack deploy` (legacy v3 schema) rejects it.
# Stack name comes from the deploy command above.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: stcz-ovr-app:${TAG:-latest}
    environment:
      NODE_ENV: production
      TZ: Asia/Manila
      PORT: "4300"
      HOSTNAME: 0.0.0.0
      DATABASE_URL: ${OVR_DATABASE_URL}
      REDIS_URL: ${OVR_REDIS_URL}
      SESSION_SECRET: ${OVR_SESSION_SECRET}
      EOVR_DATA_BACKEND: prisma
      COOKIE_SECURE: "true"
    networks: [edge]
    extra_hosts: ["host.docker.internal:host-gateway"]
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:4300/api/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    deploy:
      replicas: ${WEB_REPLICAS:-2}
      restart_policy: { condition: any }
      update_config: { order: start-first, parallelism: 1, delay: 8s, failure_action: rollback }
      rollback_config: { order: stop-first, parallelism: 1 }

  edge:
    image: nginx:1.27-alpine
    ports:
      - { target: 80,  published: 80,  mode: host }
      - { target: 443, published: 443, mode: host }
    networks: [edge]
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/certbot:/var/www/certbot:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/healthz-edge"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      restart_policy: { condition: any }
      update_config: { order: start-first }

networks:
  edge:
    driver: overlay
    attachable: true
