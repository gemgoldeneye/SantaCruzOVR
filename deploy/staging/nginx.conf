# SantaCruzOVR STAGING edge (REFERENCE ONLY).
#
# On staging the SHARED edge (deploy/edge/ in the central deploy repo) owns
# :80/:443 and routes ovr-stacruz-staging.<domain> -> http://stcz-ovr-app:4300
# over zambal-edge. This file documents the single public route the app expects;
# remote-deploy.sh does NOT render or mount it (the shared edge does the routing).
# DOMAIN is the staging base (e.g. glstest.site).

worker_processes auto;
events { worker_connections 2048; }

http {
  resolver 127.0.0.11 valid=10s ipv6=off;
  resolver_timeout 5s;

  sendfile on; tcp_nopush on; keepalive_timeout 65;
  client_max_body_size 25m;
  proxy_http_version 1.1;

  gzip on;
  gzip_types text/plain text/css application/json application/javascript application/wasm image/svg+xml;
  gzip_min_length 1024;

  map $http_upgrade $conn_upgrade { default upgrade; '' close; }

  server {
    listen 80 default_server;
    location = /healthz-edge { return 200 "ok\n"; }
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://$host$request_uri; }
  }

  # ---- ovr (Next standalone app; API routes live in /api/*) ----
  server {
    listen 443 ssl; http2 on;
    server_name ovr-stacruz-staging.DOMAIN;
    ssl_certificate     /etc/letsencrypt/live/ovr-stacruz-staging.DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ovr-stacruz-staging.DOMAIN/privkey.pem;
    location / {
      set $up http://app:4300;
      proxy_pass $up;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto https;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $conn_upgrade;
      proxy_read_timeout 300s;
    }
  }
}
